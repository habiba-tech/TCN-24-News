<section class="wrap">
  <div class="grid top">
    <app-news-card class="span2" [item]="topRow[0]"></app-news-card>
    <app-news-card [item]="topRow[1]"></app-news-card>
    <app-news-card [item]="topRow[2]"></app-news-card>
  </div>

  <div class="grid bottom">
    <app-news-card *ngFor="let n of secondRow" [item]="n"></app-news-card>
  </div>
</section>
